---
# Common playbook preparation.

# Expose ansible version
- name: Display Ansible version
  ansible.builtin.debug:
    var: ansible_facts["version"]["full"]

# A container tag must be provided.
- name: Assert stack container image tag
  ansible.builtin.assert:
    that:
    - stack_image_tag is defined
    - stack_image_tag | length > 0
    fail_msg: "'stack_image_tag' is either undefined or blank"

# The installation selects which encrypted vault of sensitive material is
# loaded (e.g. 'vars/sensitive-argus.vault' for the 'argus' installation).
# It is common to all roles and must be a safe identifier because it is
# used in filenames and environment variable names.

- name: Assert the installation is set
  ansible.builtin.assert:
    that:
    - fragalysis_installation is defined
    - fragalysis_installation | string | length > 0
    - fragalysis_installation is match('^[a-z0-9][a-z0-9-]*$')
    fail_msg: >-
      'fragalysis_installation' must be set to a lower-case installation
      name (letters, digits and hyphens only), e.g.
      '-e fragalysis_installation=argus'.

- name: Assert ingress class
  ansible.builtin.assert:
    that:
    - stack_ingress_class in ['nginx', 'traefik']
    fail_msg: >-
      'stack_ingress_class' must be 'nginx' or 'traefik'
      (got '{{ stack_ingress_class }}')

# Kubernetes credentials
#
# We load the path to the kubeconfig from the KUBECONFIG environment
# variable, falling back to the conventional '~/.kube/config' when it is
# unset, then assert that the resolved file actually exists.

- name: Set kubeconfig fact
  ansible.builtin.set_fact:
    k8s_kubeconfig: >-
      {{ lookup('env', 'KUBECONFIG')
         or lookup('env', 'HOME') ~ '/.kube/config' }}

- name: Locate the kubeconfig
  ansible.builtin.stat:
    path: "{{ k8s_kubeconfig }}"
  register: kubeconfig_stat

- name: Assert authentication
  ansible.builtin.assert:
    that:
    - kubeconfig_stat.stat.exists
    fail_msg: >-
      No kubeconfig found at '{{ k8s_kubeconfig }}';
      set KUBECONFIG or create '~/.kube/config'.

# The stack namespace is taken from the USER environment variable.
# The namespace is expected to already exist in the cluster - this role
# asserts that it is present rather than creating it.

- name: Set namespace from the USER environment variable
  ansible.builtin.set_fact:
    stack_namespace: "{{ lookup('env', 'USER') }}"

- name: Assert namespace is set
  ansible.builtin.assert:
    that:
    - stack_namespace | string | length > 0
    fail_msg: >-
      The USER environment variable must be set;
      it provides the stack namespace.

- name: Get namespace '{{ stack_namespace }}'
  kubernetes.core.k8s_info:
    kind: Namespace
    name: "{{ stack_namespace }}"
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
  register: prep_namespace_result

- name: Assert namespace exists ({{ stack_namespace }})
  ansible.builtin.assert:
    that:
    - prep_namespace_result.resources | length > 0
    fail_msg: >-
      The namespace '{{ stack_namespace }}' does not exist or you do not have access to it;
      you must have access before running this playbook.

# Collect and display freeze result

- name: Freeze
  ansible.builtin.command: pip freeze
  changed_when: false
  register: freeze_result

- name: Display freezer
  ansible.builtin.debug:
    var: freeze_result.stdout_lines
