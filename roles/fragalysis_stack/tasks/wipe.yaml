---
# Tasks required to 'wipe' a deployed version of Fragalysis.
# Rather than a full delete, which would simply require the removal of the
# namespace, this play leaves the SSL certificate and (optionally)
# the database (normally no) and media (normally yes) volumes.
#
# Designed for use predominantly for the Production cluster's staging stack.
#
# This playbook first ensures that the Fragalysis namespace exists
# and that an existing deployment exists - the user is first supposed
# to have deployed the stack before wiping it.

- name: Prepare
  ansible.builtin.include_tasks: prep.yaml

# Go...

- name: Wipe the stack
  module_defaults:
    group/k8s:
      kubeconfig: "{{ k8s_kubeconfig }}"
  block:
  - name: Get expected namespace ({{ stack_namespace }})
    kubernetes.core.k8s_info:
      kind: Namespace
      name: "{{ stack_namespace }}"
    register: ns_result

    # To 'wipe' we remove: -
    # - Stack
    #  - Redis
    # - Django secret
    # - Database
    # And then, unconditionally delete: -
    # - Database volume
    # - Media volume
  - name: Wipe (if namespace exists)
    when: ns_result.resources | length > 0
    block:
    - name: Set django secret fact
          # These facts are required to remove the secret...
      ansible.builtin.set_fact:
        stack_django_secret_key_fact: "{{ stack_django_secret_key }}"
        stack_django_superuser_password_fact: "{{ stack_django_superuser_password }}"

    - name: Shutdown stack, and redis
      kubernetes.core.k8s:
        definition: "{{ lookup('template', item) }}"
        state: absent
        wait: yes
      loop:
      - statefulset-stack.yaml.j2
      - statefulset-worker.yaml.j2
      - deployment-beat.yaml.j2
      - deployment-redis.yaml.j2
      - secret-django.yaml.j2

    - name: Wait for stack to disappear
      kubernetes.core.k8s_info:
        kind: Pod
        name: stack-0
        namespace: "{{ stack_namespace }}"
      register: stack_result
      until: stack_result.resources | length == 0
      delay: 8
      retries: "{{ (wait_timeout | int / 8) | int }}"

    - name: Wait for worker to disappear
      kubernetes.core.k8s_info:
        kind: Pod
        name: worker-0
        namespace: "{{ stack_namespace }}"
      register: worker_result
      until: worker_result.resources | length == 0
      delay: 8
      retries: "{{ (wait_timeout | int / 8) | int }}"

    - name: Remove media volume
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'pvc-media.yaml.j2') }}"
        state: absent
        wait: yes
      when: stack_shutdown_remove_media_volume | bool

    - name: Shutdown database
      kubernetes.core.k8s:
        definition: "{{ lookup('template', item) }}"
        state: absent
        wait: yes
      loop:
      - service-pgbouncer.yaml.j2
      - deployment-pgbouncer.yaml.j2
      - statefulset-database.yaml.j2

    - name: Wait for database to disappear
      kubernetes.core.k8s_info:
        kind: Pod
        name: database-0
        namespace: "{{ stack_namespace }}"
      register: db_result
      until: db_result.resources | length == 0
      delay: 8
      retries: "{{ (wait_timeout | int / 8) | int }}"

    - name: Remove database volume
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'pvc-database.yaml.j2') }}"
        state: absent
        wait: yes
      when: stack_shutdown_remove_database_volume | bool

  # Done.
